<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczegółowy Cennik | Immaculate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pricing-detailed { padding: 120px 0 80px; background: #f9f9f9; }
        .price-table-wrapper { 
            max-width: 900px; 
            margin: 40px auto; 
            background: #fff; 
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .price-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .price-table th { 
            text-align: left; 
            padding: 15px; 
            border-bottom: 2px solid #e0c28d; 
            font-family: 'Cinzel', serif;
            color: #1a1a1a;
            font-size: 1.1rem;
        }
        .price-table td { padding: 15px; border-bottom: 1px solid #eee; font-family: 'Montserrat', sans-serif; }
        .price-table tr:hover { background: #fcfaf5; }
        .category-row { background: #1a1a1a; color: #fff; }
        .category-row td { 
            font-family: 'Cinzel', serif; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            padding: 20px 15px;
            background: #1a1a1a;
            color: #e0c28d;
        }
        .price-val { font-weight: 600; color: #1a1a1a; text-align: right; }
        .price-unit { color: #888; font-size: 0.9rem; text-align: right; }
        .back-home { margin-top: 20px; display: inline-block; color: #e0c28d; text-decoration: none; font-weight: 600; }
        .back-home i { margin-right: 8px; }
    </style>
</head>
<body>
    <header class="main-header" style="background: #1a1a1a; position: fixed;">
        <nav class="container">
            <a href="index.html#home" class="brand">
                <span class="brand-main">Immaculate</span>
                <span class="brand-sub">LUXURY TEXTILE CARE</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html#home">Powrót</a></li>
            </ul>
        </nav>
    </header>

    <main class="pricing-detailed">
        <div class="container">
            <div class="section-header-luxury" style="text-align: center;">
                <span class="section-tag">Inwestycja</span>
                <h2>Szczegółowe Atelier Cen</h2>
                <p>Przejrzysty wykaz usług pielęgnacyjnych. Wszystkie ceny zawierają najwyższej jakości preparaty.</p>
            </div>

            <div class="price-table-wrapper">
                <table class="price-table" id="dynamic-price-table">
                    <thead>
                        <tr>
                            <th>Rodzaj Usługi</th>
                            <th style="text-align: right;">Cena</th>
                            <th style="text-align: right;">Jednostka</th>
                        </tr>
                    </thead>
                    <tbody id="price-body">
                        <!-- Tu zostaną wstawione dane z JS -->
                    </tbody>
                </table>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Powrót do strony głównej</a>
            </div>
        </div>
    </main>

    <footer class="footer-luxury">
        <div class="container">
            <p>&copy; 2026 Immaculate. Wszelkie prawa zastrzeżone.</p>
        </div>
    </footer>

    <script>
        async function loadPrices() {
            try {
                const response = await fetch('prices.txt');
                const data = await response.text();
                const lines = data.split('
');
                const tbody = document.getElementById('price-body');
                
                lines.forEach(line => {
                    if (line.trim() === '') return;
                    
                    if (line.startsWith('#')) {
                        // To jest kategoria
                        const categoryName = line.replace('# Kategorie:', '').trim();
                        const row = document.createElement('tr');
                        row.className = 'category-row';
                        row.innerHTML = `<td colspan="3">${categoryName}</td>`;
                        tbody.appendChild(row);
                    } else if (line.includes('|')) {
                        // To jest usługa
                        const [service, price, unit] = line.split('|').map(s => s.trim());
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${service}</td>
                            <td class="price-val">${price}</td>
                            <td class="price-unit">${unit}</td>
                        `;
                        tbody.appendChild(row);
                    }
                });
            } catch (error) {
                console.error('Błąd ładowania cennika:', error);
            }
        }
        document.addEventListener('DOMContentLoaded', loadPrices);
    </script>
</body>
</html>
