<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczegółowy Cennik | Immaculate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
        <style>
            .pricing-page { padding-top: 120px; background: var(--light); min-height: 100vh; padding-bottom: 60px; }
            .table-container { 
                background: var(--white); 
                border-radius: 20px; 
                padding: 40px; 
                margin: 40px auto; 
                box-shadow: var(--shadow);
                max-width: 1000px;
                overflow: hidden;
            }
            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .price-table { width: 100%; border-collapse: collapse; min-width: 500px; }
            
            @media (max-width: 768px) {
                .table-container { padding: 20px 15px; border-radius: 15px; }
                .pricing-page { padding-top: 100px; }
                .page-header h2 { font-size: 24px; }
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="container">
                    <a href="index.html" class="logo">Immaculate<span>.</span></a>
                    <ul class="nav-links">
                        <li><a href="index.html#home">Start</a></li>
                        <li><a href="index.html#about">O nas</a></li>
                        <li><a href="index.html#pricing">Cennik</a></li>
                        <li><a href="index.html#contact">Kontakt</a></li>
                    </ul>
                    <div class="burger">
                        <div class="line1"></div>
                        <div class="line2"></div>
                        <div class="line3"></div>
                    </div>
                </div>
            </nav>
        </header>
    
        <main class="pricing-page">
            <div class="container">
                <a href="index.html#pricing" class="back-link"><i class="fas fa-arrow-left"></i> Powrót do strony głównej</a>
                
                <div class="page-header">
                    <span class="sub-title">Pełna oferta</span>
                    <h2>Szczegółowy Cennik Usług</h2>
                </div>
    
                <div class="table-container">
                    <div class="table-responsive">
                        <table class="price-table">
                            <thead>
                                <tr>
                                    <th>Usługa</th>
                                    <th style="text-align: right;">Cena</th>
                                    <th style="text-align: right;">Jednostka</th>
                                </tr>
                            </thead>
                            <tbody id="price-body">
                                <!-- Ładowane przez JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 Immaculate. Wszelkie prawa zastrzeżone.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script>
        async function loadPrices() {
            try {
                const response = await fetch('prices.txt');
                const data = await response.text();
                const lines = data.split('\n');
                const tbody = document.getElementById('price-body');
                
                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return;
                    
                    if (trimmed.startsWith('#')) {
                        const cat = trimmed.replace(/^#\s*(Kategorie:)?\s*/, '').trim();
                        const row = document.createElement('tr');
                        row.className = 'category-row';
                        row.innerHTML = `<td colspan="3">${cat}</td>`;
                        tbody.appendChild(row);
                    } else if (trimmed.includes('|')) {
                        const [service, price, unit] = trimmed.split('|').map(s => s.trim());
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${service}</td>
                            <td class="price-val">${price}</td>
                            <td class="price-unit">${unit}</td>
                        `;
                        tbody.appendChild(row);
                    }
                });
            } catch (e) { console.error(e); }
        }
        document.addEventListener('DOMContentLoaded', loadPrices);
    </script>
</body>
</html>
